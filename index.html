<!DOCTYPE html>

<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>5日間の献立ジェネレーター</title>

 

  <link rel="manifest" href="manifest.json">

  <link rel="apple-touch-icon" href="icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

 

  <link rel="stylesheet" href="style.css">

</head>

 

<body>

<div class="container">

  <h1>平日5日間の献立作成</h1>

  <div class="subtitle">AIプランナー（じぇみちゃん）があなたに最適な献立を提案します</div>

 

  <!-- エラー表示エリア -->

  <div id="errorArea" class="error-area" style="display:none;" role="alert" aria-live="assertive"></div>

 

  <div class="form-section">

 

    <div class="form-group">

      <label for="stockIngredients">【冷蔵庫・冷凍庫・食品庫にある食材】</label>

      <textarea id="stockIngredients" placeholder="例：キャベツ1/2玉、玉ねぎ2個、鶏もも肉2枚、冷凍うどん"></textarea>

    </div>

 

    <div class="form-group">

      <label for="priorityIngredients">【優先的に消費したい食材】※傷みやすいものなど</label>

      <input type="text" id="priorityIngredients" placeholder="例：ひき肉（今日まで）、もやし">

    </div>

 

    <div class="form-group">

      <label for="alwaysIngredients">【常備食材】※基本固定、買い足し不要として計算</label>

      <textarea id="alwaysIngredients">卵、豆腐、納豆、牛乳、基本調味料（味噌・醤油・砂糖・塩・こしょう・油・マヨネーズ・ケチャップ・コンソメ・中華スープの素）</textarea>

    </div>

 

    <div class="form-group">

      <label for="budgetLimit">【買い足し予算】</label>

      <select id="budgetLimit">

        <option value="上限なし">上限なし</option>

        <option value="1500円">1500円</option>

        <option value="1000円">1000円</option>

        <option value="500円">500円</option>

        <option value="なし">なし（買い足さない）</option>

      </select>

    </div>

 

 

<h2 class="form-heading">基本条件</h2>

 

<div class="form-group">

  <label for="adultCount">大人の人数</label>

  <select id="adultCount">

    <option value="1">1人</option>

    <option value="2" selected>2人</option>

    <option value="3">3人</option>

    <option value="4">4人</option>

  </select>

</div>

 

<div class="form-group">

  <label for="childCount">子どもの人数</label>

  <select id="childCount">

    <option value="0" selected>0人</option>

    <option value="1">1人</option>

    <option value="2">2人</option>

    <option value="3">3人</option>

    <option value="4">4人</option>

  </select>

</div>

 

<div class="form-group">

  <label for="dayCount">作成日数</label>

  <select id="dayCount">

    <option value="3">3日分</option>

    <option value="4">4日分</option>

    <option value="5" selected>5日分</option>

    <option value="6">6日分</option>

    <option value="7">7日分</option>

  </select>

</div>

 

    <div class="form-group">

      <div class="screenshot-zone">

        <label for="screenshotInput">【お気に入りインスタスクショ】※あれば選択</label>

        <input type="file" id="screenshotInput" accept="image/*">

        <div class="note">画像から料理名と主な食材を読み取り、5日間のどこかに組み込みます。※5MB以内</div>

      </div>

    </div>

 

    <div class="btn-container">

      <button id="generateBtn" type="button">献立をじぇみちゃんに考えてもらう</button>

      <div id="loadingText" class="loading" style="display:none;" aria-live="polite">

        ⏳ じぇみちゃんが献立プランを一生懸命作成中...<br>

        （AIが思考するため10〜30秒ほどかかります）

      </div>

      <div class="note">

        ※APIキーをHTML内に直接入れる場合、公開サイトでは第三者に見られる可能性があります。

      </div>

    </div>

 

  </div><!-- /.form-section -->

 

  <div id="resultActions" class="result-actions" style="display:none;">

    <button id="copyBtn" class="secondary-btn" type="button">献立をコピーする</button>

    <button class="secondary-btn" type="button" onclick="clearSavedResult()">保存済み献立を消す</button>

  </div>

 

  <div id="resultArea" class="result-section" style="display:none;" aria-live="polite"></div>

</div>

 

<!-- DOMPurify: innerHTML注入前のサニタイズに使用 -->

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

<script src="app.js"></script>

</body>

</html>
